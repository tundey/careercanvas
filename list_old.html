<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Tracking List</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

  <!-- Application Global Navigation Navbar -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-xl">📋</span>
        <h1 class="font-bold text-lg text-slate-900 tracking-tight">Applications Master List</h1>
      </div>
      <a href="index.html" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-xl transition">
        🫲 Back to Kanban Board
      </a>
    </div>
  </header>

  <!-- Main View Frame -->
  <main class="flex-1 w-full max-w-7xl mx-auto px-6 py-8 box-border">
    <div class="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden">
	
<div class="flex flex-wrap items-center justify-between gap-4 bg-white p-4 rounded-xl border border-slate-200 mb-6 text-sm shadow-xs">
  <div class="flex items-center gap-3">
    <span class="font-bold text-slate-700">🗂️ Group View By:</span>
    <div class="inline-flex rounded-lg p-0.5 bg-slate-100 border border-slate-200">
      <button type="button" id="btn-group-none" class="group-toggle-btn px-4 py-1.5 rounded-md font-semibold text-xs transition duration-150 bg-white text-slate-800 shadow-xs">
        None (Flat List)
      </button>
      <button type="button" id="btn-group-company" class="group-toggle-btn px-4 py-1.5 rounded-md font-semibold text-xs transition duration-150 text-slate-600 hover:text-slate-900">
        Company
      </button>
      <button type="button" id="btn-group-status" class="group-toggle-btn px-4 py-1.5 rounded-md font-semibold text-xs transition duration-150 text-slate-600 hover:text-slate-900">
        Status
      </button>
    </div>
  </div>
  <div id="group-summary-badge" class="text-xs text-slate-400 italic"></div>
</div>
	
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[800px]">
          
          <!-- Interactive Sortable Headings -->
          <thead class="bg-slate-50 border-b border-slate-200 text-xs font-bold uppercase text-slate-500 tracking-wider">
            <tr>
              <th class="sortable-header p-4 cursor-pointer select-none hover:bg-slate-100 hover:text-slate-900 transition" data-sort="companyName">
                Company <span class="sort-icon inline-block w-3 ml-1 text-slate-400"></span>
              </th>
              <th class="sortable-header p-4 cursor-pointer select-none hover:bg-slate-100 hover:text-slate-900 transition" data-sort="jobTitle">
                Job Title <span class="sort-icon inline-block w-3 ml-1 text-slate-400"></span>
              </th>
              <th class="sortable-header p-4 cursor-pointer select-none hover:bg-slate-100 hover:text-slate-900 transition" data-sort="status">
                Status <span class="sort-icon inline-block w-3 ml-1 text-slate-400"></span>
              </th>
              <th class="sortable-header p-4 cursor-pointer select-none hover:bg-slate-100 hover:text-slate-900 transition" data-sort="location">
                Location <span class="sort-icon inline-block w-3 ml-1 text-slate-400"></span>
              </th>
              <th class="sortable-header p-4 cursor-pointer select-none hover:bg-slate-100 hover:text-slate-900 transition" data-sort="dateApplied">
                Date Applied <span class="sort-icon inline-block w-3 ml-1 text-slate-400"></span>
              </th>
            </tr>
          </thead>
          
          <!-- Dynamic Target Body Injection Node -->
          <tbody id="list-table-body" class="divide-y divide-slate-200 text-sm text-slate-700">
            <tr>
              <td colspan="5" class="p-8 text-center text-slate-400 font-medium">Syncing database assets...</td>
            </tr>
          </tbody>

        </table>
      </div>
    </div>
  </main>

  <script type="module" src="js/list.js"></script>
</body>
</html>
